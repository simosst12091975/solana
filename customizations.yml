---
- name: Optimize Solana Validators
  hosts: all
  become: yes

  tasks:

    - name: Ensure conntrack module is loaded
      community.general.modprobe:
        name: nf_conntrack
        state: present

    - name: Set conntrack max limit
      ansible.posix.sysctl:
        name: net.netfilter.nf_conntrack_max
        value: '1048576'
        state: present
        reload: yes
    
    - name: Update sysctl parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: 'net.core.rmem_max', value: '134217728' }
        - { name: 'net.core.wmem_max', value: '134217728' }
        - { name: 'net.core.rmem_default', value: '26214400' }
        - { name: 'net.core.wmem_default', value: '26214400' }
        - { name: 'net.ipv4.tcp_congestion_control', value: 'bbr' }
        - { name: 'vm.swappiness', value: '10' }
        - { name: 'net.netfilter.nf_conntrack_max', value: '1048576' }

    - name: Set CPU governor to performance
      shell: |
        echo 'performance' | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
        echo 'GOVERNOR="performance"' > /etc/default/cpufrequtils

    - name: Enable amd_pstate driver
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="amd_pstate=active processor.max_cstate=0"'

    - name: Configure GRUB for AMD P-State and C-States
      ansible.builtin.command: update-grub

    - name: Configure SSH security
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^PermitRootLogin', line: 'PermitRootLogin no' }
      notify: restart ssh

  handlers:
    - name: update grub
      command: update-grub

    - name: restart ssh
      service:
        name: sshd
        state: restarted
